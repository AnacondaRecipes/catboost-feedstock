{% set name = "catboost" %}
{% set version = "1.2.8" %}
{% set build_number = 0 %}

# CUDA builds get higher build number for solver preference
{% if (gpu_variant or "").startswith('cuda') %}
{% set build_number = build_number + 100 %}
{% endif %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # For CUDA builds: build from source
  url: https://github.com/catboost/catboost/archive/refs/tags/v{{ version }}.tar.gz  # [(gpu_variant or "").startswith('cuda')]
  sha256: 5b0c446cc48a1d1c38073cc20de0f191afd099222a97596d8bf148b04efbf7bd  # [(gpu_variant or "").startswith('cuda')]
  patches:  # [(gpu_variant or "").startswith('cuda')]
    - patches/conda.diff  # [(gpu_variant or "").startswith('cuda')]
    - patches/disable-libcxxabi-parts-cuda.patch  # [(gpu_variant or "").startswith('cuda')]
    - patches/provide-stlfwd-header.patch  # [(gpu_variant or "").startswith('cuda')]
    - patches/disable-bfloat16-builtins-x86_64-cuda.patch  # [(gpu_variant or "").startswith('cuda')]
    - patches/fix-value-markers-gcc.patch  # [(gpu_variant or "").startswith('cuda')]
    - patches/fix-size-fitter-include.patch  # [(gpu_variant or "").startswith('cuda')]
    - patches/fix-expanders-include.patch  # [(gpu_variant or "").startswith('cuda')]

build:
  number: {{ build_number }}

  # Skip unsupported configurations
  # ppc64le: not supported by catboost
  skip: true  # [ppc64le]
  # aarch64: CUDA not supported for this architecture
  skip: true  # [linux and aarch64 and (gpu_variant or "").startswith('cuda')]

  # Build strings identify the variant
  string: cuda{{ cuda_compiler_version | replace('.', '') }}_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [(gpu_variant or "").startswith('cuda')]
  string: cpu_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}                                                 # [gpu_variant == "none"]

  # De-prioritize CPU variants so CUDA variants are preferred when available
  track_features:   # [gpu_variant == "none"]
    - catboost_cpu  # [gpu_variant == "none"]

  # Allow missing CUDA runtime libraries (provided by NVIDIA driver)
  missing_dso_whitelist:                # [(gpu_variant or "").startswith('cuda')]
    - "**/libcuda.so*"                  # [(gpu_variant or "").startswith('cuda')]
    - "**/nvcuda.dll"                   # [(gpu_variant or "").startswith('cuda')]

requirements:
  build:
    # Common build tools
    - {{ compiler('c') }}
    - {{ stdlib('c') }}                 # [unix]
    - cmake >=3.24                      # [(gpu_variant or "").startswith('cuda')]
    - make                              # [unix and (gpu_variant or "").startswith('cuda')]
    - ninja-base                        # [win and (gpu_variant or "").startswith('cuda')]
    # curl is needed for downloading whl files in build.sh (CPU builds)
    - curl 8.12.1                       # [gpu_variant == "none"]

    # CUDA build requirements (source build)
    - {{ compiler('cxx') }}             # [(gpu_variant or "").startswith('cuda')]
    - {{ compiler('cuda') }}            # [(gpu_variant or "").startswith('cuda')]
    - lld >=7                           # [unix and (gpu_variant or "").startswith('cuda')]
    - ragel >=6.10                      # [(gpu_variant or "").startswith('cuda')]
    - yasm >=1.3.0                      # [(gpu_variant or "").startswith('cuda')]
    - swig >=4.0.2                      # [(gpu_variant or "").startswith('cuda')]
    - yarn                              # [(gpu_variant or "").startswith('cuda')]

  host:
    - python
    - pip
    - setuptools >=64.0
    - wheel

    # CUDA host requirements (source build)
    - cython ~=3.0.10                                                 # [(gpu_variant or "").startswith('cuda')]
    - numpy                                                           # [(gpu_variant or "").startswith('cuda')]
    - openssl                                                         # [(gpu_variant or "").startswith('cuda')]
    - jupyterlab >=3.0                                                # [(gpu_variant or "").startswith('cuda')]
    - cuda-version {{ cuda_compiler_version }}                        # [(gpu_variant or "").startswith('cuda')]
    - cuda-cudart-dev                                                 # [(gpu_variant or "").startswith('cuda')]

  run:
    - python
    - numpy >=1.16.0,<3.0
    - pandas >=0.24.0
    - scipy
    - six
    - plotly
    - matplotlib-base
    # python-graphviz avoids the pip check error,
    # and is needed for 'plot_tree' function
    - python-graphviz

    # CUDA runtime requirements
    - {{ pin_compatible('cuda-version', max_pin='x.x') }}             # [(gpu_variant or "").startswith('cuda')]

  run_constrained:
    - ipywidgets >=7.0,<9.0
    # CUDA virtual package constraint
    - __cuda                                                          # [(gpu_variant or "").startswith('cuda')]
    # Relax jupyterlab version constraints (only affects catboost visualization)
    - {{ pin_compatible("jupyterlab", max_pin=None) }}                # [(gpu_variant or "").startswith('cuda')]

test:
  imports:
    - catboost
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
  requires:
    - pip

about:
  home: https://catboost.ai
  license: Apache-2.0
  license_family: Apache
  license_file:
    - LICENSE
  summary: Gradient boosting on decision trees library
  description: |
    General purpose gradient boosting on decision trees library with categorical features support out of the box.
    It is easy to install, contains fast inference implementation and supports CPU and GPU (even multi-GPU) computation.
  doc_url: https://catboost.ai/en/docs/
  dev_url: https://github.com/catboost/catboost

extra:
  recipe-maintainers:
    - sab
    - kizill
    - nikitxskv
    - dbakshee
    - andrey-khropov
