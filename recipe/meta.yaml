{% set name = "catboost" %}
{% set version = "1.2.8" %}

{% set build_num = 0 %}
{% if (gpu_variant or "").startswith("cuda") %}
{% set build_num = build_num + 100 %}
{% endif %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/catboost/catboost/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 5b0c446cc48a1d1c38073cc20de0f191afd099222a97596d8bf148b04efbf7bd
  patches:                                                                                      # [(gpu_variant or "").startswith("cuda")]
    - patches/conda.diff                                                                        # [(gpu_variant or "").startswith("cuda")]
    - patches/reallocarray-c-compat.patch                                                       # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-value-marker-create.patch                                                     # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-expanders-cstddef.patch                                                       # [(gpu_variant or "").startswith("cuda")]

build:
  number: {{ build_num }}
  # Build string: cuda120_py* for CUDA, cpu_py* for CPU
  string: cuda{{ cuda_compiler_version | replace('.', '') }}_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [(gpu_variant or "").startswith("cuda")]
  string: cpu_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}                                                  # [not (gpu_variant or "").startswith("cuda")]
  # De-prioritize CPU variants when CUDA is available
  track_features:                     # [not (gpu_variant or "").startswith("cuda")]
    - catboost_cpu                    # [not (gpu_variant or "").startswith("cuda")]
  missing_dso_whitelist:              # [(gpu_variant or "").startswith("cuda")]
    - "**/libcuda.so*"                # [(gpu_variant or "").startswith("cuda")]

requirements:
  build:
    # CPU builds just need curl to download wheels
    - {{ compiler('c') }}             # [not (gpu_variant or "").startswith("cuda")]
    - curl 8.12.1                     # [not (gpu_variant or "").startswith("cuda")]
    - cmake                           # [not (gpu_variant or "").startswith("cuda")]
    - make                            # [unix and not (gpu_variant or "").startswith("cuda")]
    # CUDA builds need full toolchain
    - ragel >=6.10                    # [(gpu_variant or "").startswith("cuda")]
    - yasm >=1.3.0                    # [(gpu_variant or "").startswith("cuda")]
    - swig >=4.0.2                    # [(gpu_variant or "").startswith("cuda")]
    - cmake >=3.24                    # [(gpu_variant or "").startswith("cuda")]
    - make                            # [(gpu_variant or "").startswith("cuda")]
    - {{ compiler('c') }}             # [(gpu_variant or "").startswith("cuda")]
    - {{ compiler('cxx') }}           # [(gpu_variant or "").startswith("cuda")]
    # Clang is required for CUDA builds (catboost requirement)
    - clangxx >=17,<18                # [(gpu_variant or "").startswith("cuda")]
    - {{ stdlib('c') }}               # [(gpu_variant or "").startswith("cuda")]
    - {{ compiler('cuda') }}          # [(gpu_variant or "").startswith("cuda")]
    - lld >=7                         # [(gpu_variant or "").startswith("cuda")]
    - yarn                            # [(gpu_variant or "").startswith("cuda")]
  host:
    - python
    - pip
    - setuptools >=64.0
    - wheel
    # CUDA build host requirements
    - openssl                         # [(gpu_variant or "").startswith("cuda")]
    - cython ~=3.0.10                 # [(gpu_variant or "").startswith("cuda")]
    - numpy                           # [(gpu_variant or "").startswith("cuda")]
    - cuda-version {{ cuda_compiler_version }}  # [(gpu_variant or "").startswith("cuda")]
    - cuda-driver-dev                           # [(gpu_variant or "").startswith("cuda")]
    - cuda-cudart-dev                           # [(gpu_variant or "").startswith("cuda")]
  run:
    - python
    - numpy >=1.16.0,<3.0
    - pandas >=0.24.0
    - scipy
    - six
    - plotly
    - matplotlib-base
    - python-graphviz
    # CUDA runtime requirements
    - {{ pin_compatible('cuda-version', max_pin='x.x') }}  # [(gpu_variant or "").startswith("cuda")]
  run_constrained:
    - ipywidgets >=7.0,<9.0
    - __cuda                          # [(gpu_variant or "").startswith("cuda")]

test:
  imports:
    - catboost
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
  requires:
    - pip

about:
  home: https://catboost.ai
  license: Apache-2.0
  license_family: Apache
  license_file:
    - LICENSE
  summary: Gradient boosting on decision trees library
  description: |
    General purpose gradient boosting on decision trees library with categorical features support out of the box.
    It is easy to install, contains fast inference implementation and supports CPU and GPU (even multi-GPU) computation.
  doc_url: https://catboost.ai/en/docs/
  dev_url: https://github.com/catboost/catboost

extra:
  recipe-maintainers:
    - sab
    - kizill
    - nikitxskv
    - dbakshee
    - andrey-khropov
