{% set name = "catboost" %}
{% set version = "1.2.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  number: 100  # [gpu_variant != "none"]
  number: 0    # [gpu_variant == "none"]
  string: cuda{{ cuda_compiler_version | replace('.', '') }}_py{{ python | replace('.', '') }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [(gpu_variant or "").startswith('cuda')]
  string: cpu_py{{ python | replace('.', '') }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}                                                 # [gpu_variant == "none"]

  missing_dso_whitelist:                # [(gpu_variant or "").startswith('cuda')]
    - "**/libcuda.so*"                  # [(gpu_variant or "").startswith('cuda') and linux]
    - "**/nvcuda.dll"                   # [(gpu_variant or "").startswith('cuda') and win]

requirements:
  build:
    # needs to suppress Cython needs C compiler error.
    - {{ compiler('c') }}
    - {{ compiler('cuda') }}            # [(gpu_variant or "").startswith('cuda')]
    - cmake
    - make  # [unix]
    # curl is needed only for downloading whl files in build.sh
    - curl 8.12.1
  host:
    - python
    - pip
    - setuptools >=64.0
    - wheel
    - cuda-version {{ cuda_compiler_version }}        # [(gpu_variant or "").startswith('cuda')]
    - cuda-cudart-dev {{ cuda_compiler_version }}     # [(gpu_variant or "").startswith('cuda')]
    - cuda-compat {{ cuda_compiler_version }}         # [(gpu_variant or "").startswith('cuda') and linux]
  run:
    - python
    - numpy >=1.16.0,<3.0
    - pandas >=0.24.0
    - scipy
    - six
    - plotly
    - matplotlib-base
    # python-graphviz avoids the pip check error,
    # and if you want to use 'plot_tree' function.
    - python-graphviz

    # CUDA runtime dependencies
    - {{ pin_compatible('cuda-version', max_pin='x.x') }} # [(gpu_variant or "").startswith('cuda')]
    - cuda-version {{ cuda_compiler_version }}            # [(gpu_variant or "").startswith('cuda')]
    - __cuda                                              # [(gpu_variant or "").startswith('cuda')]

  run_constrained:
    - ipywidgets >=7.0,<9.0

test:
  imports:
    - catboost
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
  requires:
    - pip

about:
  home: https://catboost.ai
  license: Apache-2.0
  license_family: Apache
  license_file:
    - LICENSE
  summary: Gradient boosting on decision trees library
  description: |
    General purpose gradient boosting on decision trees library with categorical features support out of the box.
    It is easy to install, contains fast inference implementation and supports CPU and GPU (even multi-GPU) computation.
  doc_url: https://catboost.ai/en/docs/
  dev_url: https://github.com/catboost/catboost

extra:
  recipe-maintainers:
    - sab
    - kizill
    - nikitxskv
    - dbakshee
    - andrey-khropov