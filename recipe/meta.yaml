{% set name = "catboost" %}
{% set version = "1.2.8" %}

{% set build_num = 1 %}
{% if (gpu_variant or "").startswith("cuda") %}
{% set build_num = build_num + 100 %}
{% endif %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/catboost/catboost/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 5b0c446cc48a1d1c38073cc20de0f191afd099222a97596d8bf148b04efbf7bd
  patches:                                                                                      # [(gpu_variant or "").startswith("cuda")]
    - patches/conda.diff                                                                        # [(gpu_variant or "").startswith("cuda")]
    - patches/reallocarray-c-compat.patch                                                       # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-value-marker-create.patch                                                     # [(gpu_variant or "").startswith("cuda")]
    # Missing <cstddef> includes (from PR #9)
    - patches/fix-expanders-include.patch                                                       # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-size-fitter-include.patch                                                     # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-probings-include.patch                                                        # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-size-fitters-include.patch                                                    # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-iterator-include.patch                                                        # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-containers-include.patch                                                      # [(gpu_variant or "").startswith("cuda")]
    # Missing <limits> for std::numeric_limits
    - patches/fix-ref-counted-limits.patch                                                      # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-yt-string-limits.patch                                                        # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-yt-format-limits.patch                                                        # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-yt-cast-limits.patch                                                          # [(gpu_variant or "").startswith("cuda")]
    # vector<bool> compatibility (from PR #9)
    - patches/fix-triecompiler-vectorbool.patch                                                 # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-packers-vectorbool.patch                                                      # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-binsaver-vectorbool-gcc.patch                                                 # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-calc-score-cache-vectorbool-gcc.patch                                         # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-catboost-pyx-vectorbool-data-gcc.patch                                        # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-cross-validation-vectorbool-gcc.patch                                         # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-greedy-tensor-search-vectorbool-gcc.patch                                     # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-master-vectorbool-andassign-gcc.patch                                         # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-par-util-vectorbool-map-gcc.patch                                             # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-par-context-vectorbool-cpp.patch                                              # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-par-context-vectorbool-h.patch                                                # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-ysaveload-vectorbool-gcc.patch                                                # [(gpu_variant or "").startswith("cuda")]
    # local vector<bool> handling to avoid global TArrayRef specialization
    - patches/fix-calc-score-cache-bool-control.patch                                           # [(gpu_variant or "").startswith("cuda")]
    # Linker fix: re-add default libs when using -nodefaultlibs (from PR #9)
    - patches/fix-nodefaultlibs-add-libc.patch                                                  # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-abseil-strings-link-profiling.patch                                           # [(gpu_variant or "").startswith("cuda")]
    # CUDA build fixes (from PR #9)
    - patches/disable-bfloat16-builtins-x86_64-cuda.patch                                       # [(gpu_variant or "").startswith("cuda")]
    # Iterator to pointer conversion (from PR #9)
    - patches/fix-token-structure-iterator.patch                                                # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-sparse-array-iterator-gcc.patch                                               # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-quantization-iterator-gcc.patch                                               # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-online-ctr-iterator-gcc.patch                                                 # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-model-arrayref-iterator-gcc.patch                                             # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-array-subset-iterator-gcc.patch                                               # [(gpu_variant or "").startswith("cuda")]
    # ArrayRef conversion fixes (from PR #9)
    - patches/fix-algo-data-arrayref-gcc.patch                                                  # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-data-provider-builders-arrayref-gcc.patch                                     # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-dataset-helpers-arrayref-gcc.patch                                            # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-eval-helpers-arrayref-gcc.patch                                               # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-leaves-estimator-arrayref-gcc.patch                                           # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-pointwise-oracle-arrayref-gcc.patch                                           # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-model-quantization-adapter-arrayref-gcc.patch                                 # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-model-build-helper-arrayref-gcc.patch                                         # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-vector-helpers-arrayref-gcc.patch                                             # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-matrix-oracle-arrayref-gcc.patch                                              # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-hnsw-index-writer-gcc.patch                                                   # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-calc-score-cache-gcc.patch                                                    # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-approx-calcer-gcc.patch                                                       # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-approx-delta-calcer-multi-gcc.patch                                           # [(gpu_variant or "").startswith("cuda")]
    # Remaining GCC compatibility patches (from PR #9)
    - patches/fix-type-erasure-gcc.patch                                                        # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-error-attributes-static-assert.patch                                          # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-shared-range-new-gcc.patch                                                    # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-dot-product-avx2-gcc.patch                                                    # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-guid-use-system-array.patch                                                   # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-polymorphic-type-containers-stdvisit.patch                                    # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-array-subset-stdvisit-gcc.patch                                               # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-graph-include-variant.patch                                                   # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-features-layout-findif-gcc.patch                                              # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-compare-documents-abs-gcc.patch                                               # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-statistics-max-gcc.patch                                                      # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-langevin-utils-indexrange-gcc.patch                                           # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-error-functions-expl-gcc.patch                                                # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-error-functions-sqrtl-gcc.patch                                               # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-index-calcer-gcc.patch                                                        # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-full-model-saver-gcc.patch                                                    # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-boosting-progress-tracker-const-vector.patch                                  # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-data-provider-lambda-gcc.patch                                                # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-train-model-const-vector-gcc.patch                                            # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-logger-helpers-const-vector.patch                                             # [(gpu_variant or "").startswith("cuda")]
    - patches/fix-maybe-owning-array-holder-const-gcc.patch                                     # [(gpu_variant or "").startswith("cuda")]

build:
  number: {{ build_num }}
  # Build string: cuda120_py* for CUDA, cpu_py* for CPU
  string: cuda{{ cuda_compiler_version | replace('.', '') }}_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [(gpu_variant or "").startswith("cuda")]
  string: cpu_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}                                                  # [not (gpu_variant or "").startswith("cuda")]
  # De-prioritize CPU variants when CUDA is available
  track_features:                     # [not (gpu_variant or "").startswith("cuda")]
    - catboost_cpu                    # [not (gpu_variant or "").startswith("cuda")]
  missing_dso_whitelist:              # [(gpu_variant or "").startswith("cuda")]
    - "**/libcuda.so*"                # [(gpu_variant or "").startswith("cuda")]

requirements:
  build:
    # CPU builds just need curl to download wheels
    - {{ compiler('c') }}             # [not (gpu_variant or "").startswith("cuda")]
    - curl 8.12.1                     # [not (gpu_variant or "").startswith("cuda")]
    - cmake                           # [not (gpu_variant or "").startswith("cuda")]
    - make                            # [unix and not (gpu_variant or "").startswith("cuda")]
    # CUDA builds need full toolchain
    - ragel >=6.10                    # [(gpu_variant or "").startswith("cuda")]
    - yasm >=1.3.0                    # [(gpu_variant or "").startswith("cuda")]
    - swig >=4.0.2                    # [(gpu_variant or "").startswith("cuda")]
    - cmake >=3.24                    # [(gpu_variant or "").startswith("cuda")]
    - make                            # [(gpu_variant or "").startswith("cuda")]
    - {{ compiler('c') }}             # [(gpu_variant or "").startswith("cuda")]
    - {{ compiler('cxx') }}           # [(gpu_variant or "").startswith("cuda")]
    # Clang is required for CUDA builds (catboost requirement)
    - clangxx >=17,<18                # [(gpu_variant or "").startswith("cuda")]
    - {{ stdlib('c') }}               # [(gpu_variant or "").startswith("cuda")]
    - {{ compiler('cuda') }}          # [(gpu_variant or "").startswith("cuda")]
    - lld >=7                         # [(gpu_variant or "").startswith("cuda")]
    - yarn                            # [(gpu_variant or "").startswith("cuda")]
  host:
    - python
    - pip
    - setuptools >=64.0
    - wheel
    # CUDA build host requirements
    - openssl                         # [(gpu_variant or "").startswith("cuda")]
    - cython ~=3.0.10                 # [(gpu_variant or "").startswith("cuda")]
    - numpy                           # [(gpu_variant or "").startswith("cuda")]
    - cuda-version {{ cuda_compiler_version }}  # [(gpu_variant or "").startswith("cuda")]
    - cuda-driver-dev                           # [(gpu_variant or "").startswith("cuda")]
    - cuda-cudart-dev                           # [(gpu_variant or "").startswith("cuda")]
  run:
    - python
    - numpy >=1.16.0,<3.0
    - pandas >=0.24.0
    - scipy
    - six
    - plotly
    - matplotlib-base
    - python-graphviz
    # CUDA runtime requirements
    - {{ pin_compatible('cuda-version', max_pin='x.x') }}  # [(gpu_variant or "").startswith("cuda")]
  run_constrained:
    - ipywidgets >=7.0,<9.0
    - __cuda                          # [(gpu_variant or "").startswith("cuda")]

test:
  imports:                                                                                                         # [not (gpu_variant or "").startswith("cuda")]
    - catboost                                                                                                     # [not (gpu_variant or "").startswith("cuda")]
  commands:
    # CUDA environment diagnostics (for GPU builds)
    - echo "=== CUDA Environment Check ==="                                                                        # [(gpu_variant or "").startswith("cuda")]
    - nvidia-smi || echo "nvidia-smi not available or no GPU"                                                      # [(gpu_variant or "").startswith("cuda")]
    - ls -la /usr/lib/x86_64-linux-gnu/libcuda* 2>/dev/null || echo "libcuda not in /usr/lib/x86_64-linux-gnu/"    # [(gpu_variant or "").startswith("cuda")]
    - ls -la /usr/local/cuda/lib64/libcuda* 2>/dev/null || echo "libcuda not in /usr/local/cuda/lib64/"            # [(gpu_variant or "").startswith("cuda")]
    - ldconfig -p | grep -i cuda || echo "No CUDA libs in ldconfig"                                                # [(gpu_variant or "").startswith("cuda")]
    - echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"                                                                      # [(gpu_variant or "").startswith("cuda")]
    - echo "=== End CUDA Check ==="                                                                                # [(gpu_variant or "").startswith("cuda")]
    # Import test for CUDA builds (after diagnostics)
    - python -c "import catboost"                                                                                  # [(gpu_variant or "").startswith("cuda")]
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
  requires:
    - pip

about:
  home: https://catboost.ai
  license: Apache-2.0
  license_family: Apache
  license_file:
    - LICENSE
  summary: Gradient boosting on decision trees library
  description: |
    General purpose gradient boosting on decision trees library with categorical features support out of the box.
    It is easy to install, contains fast inference implementation and supports CPU and GPU (even multi-GPU) computation.
  doc_url: https://catboost.ai/en/docs/
  dev_url: https://github.com/catboost/catboost

extra:
  recipe-maintainers:
    - sab
    - kizill
    - nikitxskv
    - dbakshee
    - andrey-khropov
