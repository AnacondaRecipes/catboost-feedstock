# CUDA variant configuration for catboost (Linux: linux-64 + linux-aarch64).
# Windows still ships the pre-built PyPI wheel (CPU-only) -- no CUDA there.
#
# Why we patch CUDA's host_defines.h in build.sh:
#   CUDA 12.3+ added a #error rejecting libc++ on x86, and 13.x extends similar
#   checks. catboost ships its own libc++ fork (libcxxcuda11) designed for CUDA;
#   the rejection is a false positive for this codebase.
#
# Compiler pinning: cuda-nvcc-impl 12.9 supports gcc_impl <15, and 13.0 supports
# gcc_impl <16, so the aggregate default gcc 14.3.0 works for both CUDA variants
# and the CPU variant. No local c_compiler_version override needed.

# gpu_variant must be defined on every platform so that meta.yaml selectors like
# `(gpu_variant or "").startswith("cuda")` evaluate without errors elsewhere.
gpu_variant:
  - none
  - cuda-12                    # [linux]
  - cuda-13                    # [linux]

cuda_compiler_version:         # [linux]
  - none                       # [linux]
  - 12.9                       # [linux]
  - 13.0                       # [linux]

cuda_compiler:                 # [linux]
  - cuda-nvcc                  # [linux]

zip_keys:                      # [linux]
  -                            # [linux]
    - gpu_variant              # [linux]
    - cuda_compiler_version    # [linux]
