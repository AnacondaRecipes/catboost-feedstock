# CUDA variant configuration for catboost
# Pattern follows llama.cpp-feedstock and faiss-split-feedstock.
# CatBoost CUDA is Linux-only (Windows uses pre-built PyPI wheels).

# gpu_variant must be defined for all platforms so that
# meta.yaml selectors like (gpu_variant or "").startswith("cuda") work everywhere.
gpu_variant:
  - none
  - cuda-12                    # [linux]

cuda_compiler_version:         # [linux]
  - none                       # [linux]
  - 12.4                       # [linux]

cuda_compiler:                 # [linux]
  - cuda-nvcc                  # [linux]

zip_keys:                      # [linux]
  -                            # [linux]
    - gpu_variant              # [linux]
    - cuda_compiler_version    # [linux]
