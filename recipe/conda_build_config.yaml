# CUDA variant configuration for catboost.
#
# linux: source-build from the upstream tarball, producing a real CUDA toolkit
# linkage. Variants are split by cuda_compiler_version (12.9, 13.0) and zipped
# with gpu_variant so each variant maps 1:1 to an nvcc.
#
# win: the upstream PyPI win_amd64 wheel statically embeds the CUDA runtime,
# cublas, etc. -- one binary handles both CPU and GPU hosts at runtime. There is
# no meaningful per-CUDA-version split on win, and conda-forge has explicitly
# left source-from-scratch on Windows as a TODO. We tag the existing wheel
# repack as a single `cuda` gpu_variant so the conda metadata advertises CUDA
# capability (build string + __cuda run dep), letting the solver prefer it on
# CUDA-capable Windows hosts while the `none` variant remains installable
# everywhere else.
#
# Why we patch CUDA's host_defines.h in build.sh (linux only):
#   CUDA 12.3+ added a #error rejecting libc++ on x86, and 13.x extends similar
#   checks. catboost ships its own libc++ fork (libcxxcuda11) designed for CUDA;
#   the rejection is a false positive for this codebase.
#
# Compiler pinning: cuda-nvcc-impl 12.9 supports gcc_impl <15, and 13.0 supports
# gcc_impl <16, so the aggregate default gcc 14.3.0 works for both CUDA variants
# and the CPU variant. No local c_compiler_version override needed.

# gpu_variant must be defined on every platform so that meta.yaml selectors like
# `(gpu_variant or "").startswith("cuda")` evaluate without errors elsewhere.
gpu_variant:
  - none
  - cuda-12                    # [linux]
  - cuda-13                    # [linux]
  - cuda                       # [win and x86_64]

cuda_compiler_version:         # [linux]
  - none                       # [linux]
  - 12.9                       # [linux]
  - 13.0                       # [linux]

cuda_compiler:                 # [linux]
  - cuda-nvcc                  # [linux]

zip_keys:                      # [linux]
  -                            # [linux]
    - gpu_variant              # [linux]
    - cuda_compiler_version    # [linux]
