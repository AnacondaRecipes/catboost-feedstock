# CatBoost CUDA variant configuration
# Based on patterns from llama.cpp-feedstock and whisper.cpp-feedstock

# Python versions (avoid 3.13 due to openssl conflicts in CUDA builds)
python:
  - 3.10
  - 3.11
  - 3.12

# C stdlib configuration (required for compiler resolution)
c_stdlib:
  - sysroot                        # [linux]
  - macosx_deployment_target       # [osx]

c_stdlib_version:
  - 2.28                           # [linux]
  - 12.1                           # [osx]
  - 2022.14                        # [win]

c_compiler:                        # [win]
  - vs2019                         # [win]
cxx_compiler:                      # [win]
  - vs2019                         # [win]

# GPU acceleration variants
# - none: CPU-only build (downloads PyPI wheels)
# - cuda-12: CUDA-enabled build (builds from source)
gpu_variant:
  - none
  - cuda-12                    # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]

# CUDA compiler configuration
# Note: Using CUDA 12.4 as conda packages don't exist for 12.0
# CatBoost v1.2.8 may work with 12.4 despite earlier concerns about 12.3+
cuda_compiler_version:         # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
  - none                       # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
  - 12.4                       # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]

cuda_compiler:                 # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
  - cuda-nvcc                  # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]

# Zip gpu_variant with cuda_compiler_version to ensure they're built together
# This ensures that cuda-12 variant gets cuda_compiler_version=12.0
# and none variant gets cuda_compiler_version=none
zip_keys:                      # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
  -                            # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
    - gpu_variant              # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
    - cuda_compiler_version    # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
